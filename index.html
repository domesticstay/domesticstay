<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>국내숙박 상시 모니터링</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:#f0f2f7;color:#1c2340;font-size:13px}
.hdr{background:linear-gradient(135deg,#0d1b6e 0%,#1a3a8f 55%,#2952c4 100%);color:#fff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;flex-direction:column}
.hdr-title{font-size:19px;font-weight:800}
.hdr-title small{display:block;font-size:11px;font-weight:400;opacity:.75;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr-date{text-align:right;font-size:11px;opacity:.8}
.hdr-date b{font-size:14px;display:block;margin-bottom:2px}
.week-sel{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;padding:7px 12px;font-size:13px;cursor:pointer;outline:none;font-weight:600}
.week-sel option{background:#0d1b6e;color:#fff}
.sumbar{background:#fff;display:flex;border-bottom:1px solid #dde2ef;overflow-x:auto}
.si{padding:11px 18px;border-right:1px solid #edf0f7;flex-shrink:0}
.si:last-child{border-right:none}
.sl{font-size:10px;font-weight:700;color:#8892aa;text-transform:uppercase;letter-spacing:.4px}
.sv{font-size:19px;font-weight:800;color:#0d1b6e;margin:3px 0 1px;line-height:1.1}
.ss{font-size:11px;color:#8892aa;font-weight:500}
.pos{color:#1b7a2b!important}.neg{color:#c62828!important}.flat{color:#8892aa!important}
.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #e8eaf2;overflow-x:auto;padding:0 16px}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:#8892aa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab:hover{color:#1a3a8f;background:#f5f7ff}
.tab.active{color:#0d1b6e;border-bottom-color:#0d1b6e}
.content{padding:18px 24px;max-width:1600px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.ovbox{background:#0d1b6e;color:#fff;border-radius:10px;padding:16px 22px;margin-bottom:18px;display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.ovi{display:flex;flex-direction:column}
.ovl{font-size:10px;opacity:.7;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.ovv{font-size:22px;font-weight:900;margin-top:3px;line-height:1}
.ovs{font-size:11px;opacity:.75;margin-top:2px}
.ovd{width:1px;height:44px;background:rgba(255,255,255,.2)}
.stitle{font-size:15px;font-weight:700;color:#1c2340;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.stitle span{font-size:11px;color:#8892aa;font-weight:400}

/* HIGHLIGHT SECTION */
.hl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:20px}
.hl-box{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8eaf2}
.hl-box h4{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hl-box h4 .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.badge-up{background:#e8f5e9;color:#1b7a2b}.badge-down{background:#fce4ec;color:#c62828}.badge-info{background:#e3f2fd;color:#1565c0}
.hl-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5}
.hl-item:last-child{border-bottom:none}
.hl-rank{width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-right:8px}
.hl-rank.up{background:#e8f5e9;color:#1b7a2b}.hl-rank.dn{background:#fce4ec;color:#c62828}
.hl-name{font-weight:600;font-size:12px;flex:1}
.hl-region{font-size:10px;color:#8892aa;background:#f5f5f5;padding:1px 6px;border-radius:8px;margin-left:6px}
.hl-val{text-align:right;font-weight:700;font-size:12px;min-width:80px}
.hl-chg{text-align:right;font-size:11px;min-width:90px}
.up{color:#1b7a2b}.dn{color:#c62828}

/* WOW COMPARE */
.wow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px}
.wow-card{background:#fff;border-radius:10px;padding:18px;border:1px solid #e8eaf2;text-align:center}
.wow-label{font-size:11px;color:#8892aa;font-weight:600;margin-bottom:8px}
.wow-vals{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:8px}
.wow-this{font-size:20px;font-weight:800;color:#0d1b6e}
.wow-arrow{font-size:14px;color:#8892aa}
.wow-prev{font-size:16px;color:#8892aa;font-weight:600}
.wow-delta{font-size:14px;font-weight:700;margin-top:4px}

.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:18px}
.rc{background:#fff;border-radius:10px;padding:14px;border:1px solid #e8eaf2;cursor:pointer;transition:all .15s}

.rch{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.rcn{font-size:14px;font-weight:700}
.rcg{font-size:17px;font-weight:800;color:#0d1b6e;margin-bottom:3px}
.rccm{font-size:12px;color:#3949ab;font-weight:600;margin-bottom:5px}
.rcbar{height:4px;background:#e8eaf6;border-radius:2px;margin-bottom:7px;overflow:hidden}
.rcbf{height:100%;background:linear-gradient(90deg,#1a3a8f,#2979ff);border-radius:2px}
.rcm{display:flex;gap:10px}
.rcmi{font-size:11px;color:#8892aa}.rcmi b{color:#1c2340;display:block;font-size:12px}

/* KPI */
.kpi-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.kpi{background:#fff;border-radius:10px;padding:14px 18px;border:1px solid #e8eaf2;flex:1;min-width:160px}
.kl{font-size:10px;font-weight:700;color:#8892aa;text-transform:uppercase;letter-spacing:.4px}
.kv{font-size:22px;font-weight:900;color:#0d1b6e;margin:4px 0 2px;line-height:1}
.ks{font-size:11px;font-weight:500}

/* TABLE */
.tw{background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e8eaf2;margin-bottom:18px}
.tw-title{font-size:14px;font-weight:700;padding:14px 16px 0;color:#1c2340}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#f7f8fc;padding:9px 10px;font-weight:700;color:#8892aa;font-size:10px;text-align:center;border-bottom:1px solid #e8eaf2;border-left:1px solid #dde2ef;white-space:nowrap}
thead th:first-child{border-left:none}
th.gf{border-left:2px solid #3949ab}
td{padding:8px 10px;border-bottom:1px solid #f3f4f9;vertical-align:middle}
td.sep{border-left:2px solid #e8eaf6;background:#fafbff}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f9ff}
.rk{width:21px;height:21px;border-radius:50%;background:#eef0fb;color:#0d1b6e;font-weight:700;font-size:10px;display:inline-flex;align-items:center;justify-content:center}
.rk.top{background:#fff3e0;color:#bf360c}
.pn{font-weight:600;font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pb{height:3px;background:#e8eaf6;overflow:hidden;width:70px;margin-top:3px;border-radius:2px}
.pbf{height:100%;background:linear-gradient(90deg,#1a3a8f,#2979ff);border-radius:2px}
.sm td,.sm th{padding:7px 8px;font-size:11px}
.footer{text-align:center;padding:16px;font-size:11px;color:#8892aa;border-top:1px solid #e8eaf2;margin-top:24px}

.ins-card{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8eaf2}
.ins-title{font-size:12px;font-weight:700;margin-bottom:10px}
@media(max-width:768px){.ins-grid{grid-template-columns:1fr}}

<td style="text-align:right"><span class="${dcU(ht.wc)}" style="font-size:11px">${fP(ht.wc)}</span></td>
<td class="sep" style="text-align:right"><span class="${dcU(ht.ag)}" style="font-weight:700">${fD(ht.ag)}</span></td>
<td class="sep" style="text-align:right"><span class="${dcU(ht.yg)}" style="font-weight:700">${fD(ht.yg)}</span></td></tr>`});
h+=`</tbody></table></div>`;

// CM Table
const cmH=[...hotels].filter(x=>x.cm>0).sort((a,b)=>b.cm-a.cm);
if(cmH.length){
h+=`<div class="tw-title">💰 공헌이익 분석</div><div class="tw"><table><thead><tr>
<th>#</th><th style="text-align:left">상품명</th><th>이번주<br>공헌이익</th><th>이익률</th>
<th class="gf" colspan=2>WoW (전주 대비)</th><th class="gf" colspan=2>4주 평균 대비</th><th class="gf" colspan=2>YoY (전년 동기)</th>
</tr><tr><th></th><th></th><th></th><th></th><th class="gf">차이</th><th>전주값</th><th class="gf">차이</th><th>4주평균</th><th class="gf">차이</th><th>작년값</th></tr></thead><tbody>`;
cmH.forEach((ht,i)=>{
const wcd=ht.cm-ht.wcm, acd=ht.cm-ht.acm, ycd=ht.cm-ht.ycm;
h+=`<tr><td style="text-align:center"><span class="rk ${i<3?"top":""}">${i+1}</span></td>
<td><div class="pn">${ht.n}</div><div style="font-size:10px;color:#3949ab">이익률 ${ht.pr?ht.pr.toFixed(2)+"%":"─"}</div></td>
<td style="text-align:right;font-weight:700">${fG(ht.cm)}</td>
<td style="text-align:center;font-size:11px">${ht.pr?ht.pr.toFixed(2)+"%":"─"}</td>
<td class="sep" style="text-align:right"><span class="${dcU(wcd)}" style="font-weight:600">${fD(wcd)}</span></td>
<td style="text-align:right;color:#8892aa;font-size:11px">${fG(ht.wcm)}</td>
<td class="sep" style="text-align:right"><span class="${dcU(acd)}" style="font-weight:600">${fD(acd)}</span></td>
<td style="text-align:right;color:#8892aa;font-size:11px">${fG(ht.acm)}</td>
<td class="sep" style="text-align:right"><span class="${dcU(ycd)}" style="font-weight:600">${fD(ycd)}</span></td>
<td style="text-align:right;color:#8892aa;font-size:11px">${fG(ht.ycm)}</td></tr>`});
h+=`</tbody></table></div>`}
return h;
}
</script></body></html>
